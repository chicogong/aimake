name: Check DNS

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      CF_API: https://api.cloudflare.com/client/v4
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: List zones for aimake.cc
        run: |
          curl -sS \
            -H "Authorization: Bearer $CF_TOKEN" \
            "$CF_API/zones?name=aimake.cc" \
            | jq '.result | map({id, name, status, account: .account.id})'

      - name: List DNS records on aimake.cc zone
        run: |
          set -euo pipefail
          zone_id=$(curl -sS \
            -H "Authorization: Bearer $CF_TOKEN" \
            "$CF_API/zones?name=aimake.cc" \
            | jq -r '.result[0].id // empty')
          if [ -z "$zone_id" ]; then
            echo "::warning::No zone for aimake.cc accessible by this token"
            exit 0
          fi
          echo "Zone ID: $zone_id"
          response=$(curl -sS \
            -H "Authorization: Bearer $CF_TOKEN" \
            "$CF_API/zones/$zone_id/dns_records?per_page=50")
          echo "$response" | jq .
          ok=$(echo "$response" | jq -r .success)
          if [ "$ok" != "true" ]; then
            echo "::warning::DNS list failed — token likely lacks DNS:Read"
          fi

      - name: Inspect aimake.cc Pages domain detail
        run: |
          curl -sS \
            -H "Authorization: Bearer $CF_TOKEN" \
            "$CF_API/accounts/$CF_ACCOUNT/pages/projects/aimake-app/domains/aimake.cc" \
            | jq .

      - name: Try create apex CNAME (probes DNS:Edit scope)
        run: |
          set -euo pipefail
          zone_id=$(curl -sS \
            -H "Authorization: Bearer $CF_TOKEN" \
            "$CF_API/zones?name=aimake.cc" \
            | jq -r '.result[0].id // empty')
          if [ -z "$zone_id" ]; then
            echo "::warning::No zone access — skipping"
            exit 0
          fi
          response=$(curl -sS -X POST \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"aimake.cc","content":"aimake-app.pages.dev","proxied":true,"ttl":1}' \
            "$CF_API/zones/$zone_id/dns_records")
          echo "$response" | jq .
          ok=$(echo "$response" | jq -r .success)
          if [ "$ok" != "true" ]; then
            echo "::warning::DNS record create failed — token likely lacks DNS:Edit scope"
          else
            echo "DNS record created"
          fi
