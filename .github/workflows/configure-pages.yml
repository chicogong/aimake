name: Configure Pages

# One-shot ops workflow: aligns the Cloudflare Pages project's production
# branch with this repo's default branch and binds the apex domain.
# Idempotent — safe to re-run.

on:
  workflow_dispatch:
    inputs:
      production_branch:
        description: 'Pages production branch'
        required: true
        default: 'master'
      apex_domain:
        description: 'Apex domain to bind (set to "" to skip)'
        required: false
        default: 'aimake.cc'

jobs:
  configure:
    name: Configure aimake-app project
    runs-on: ubuntu-latest
    env:
      CF_API: https://api.cloudflare.com/client/v4
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PROJECT: aimake-app
    steps:
      - name: Set production branch
        env:
          BRANCH: ${{ inputs.production_branch }}
        run: |
          set -euo pipefail
          response=$(curl -sS -X PATCH \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"production_branch\": \"$BRANCH\"}" \
            "$CF_API/accounts/$CF_ACCOUNT/pages/projects/$PROJECT")
          echo "$response" | jq .
          ok=$(echo "$response" | jq -r .success)
          if [ "$ok" != "true" ]; then
            echo "::error::Failed to set production branch"
            exit 1
          fi
          actual=$(echo "$response" | jq -r .result.production_branch)
          echo "Production branch is now: $actual"

      - name: Add apex custom domain
        if: inputs.apex_domain != ''
        env:
          DOMAIN: ${{ inputs.apex_domain }}
        run: |
          set -euo pipefail
          existing=$(curl -sS \
            -H "Authorization: Bearer $CF_TOKEN" \
            "$CF_API/accounts/$CF_ACCOUNT/pages/projects/$PROJECT/domains" \
            | jq -r '.result[].name // empty')
          if echo "$existing" | grep -qx "$DOMAIN"; then
            echo "Domain $DOMAIN already bound — skipping."
          else
            response=$(curl -sS -X POST \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"$DOMAIN\"}" \
              "$CF_API/accounts/$CF_ACCOUNT/pages/projects/$PROJECT/domains")
            echo "$response" | jq .
            ok=$(echo "$response" | jq -r .success)
            if [ "$ok" != "true" ]; then
              echo "::warning::Custom domain registration returned success=false (token may lack DNS:Edit). Inspect the response above."
              exit 1
            fi
          fi

      - name: List bound domains
        run: |
          curl -sS \
            -H "Authorization: Bearer $CF_TOKEN" \
            "$CF_API/accounts/$CF_ACCOUNT/pages/projects/$PROJECT/domains" \
            | jq '.result | map({name, status, certificate_authority})'

      - name: Show latest deployments
        run: |
          curl -sS \
            -H "Authorization: Bearer $CF_TOKEN" \
            "$CF_API/accounts/$CF_ACCOUNT/pages/projects/$PROJECT/deployments?per_page=3" \
            | jq '.result | map({id, environment, deployment_trigger: .deployment_trigger.metadata.branch, url, created_on})'
